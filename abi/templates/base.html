{% load static %}

<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{% block title %}Abi 28{% endblock %}</title>

        <link rel="stylesheet" href="{% static 'abi/base.css' %}" />
        <link rel="stylesheet" href="{% static 'abi/colors.css' %}" />
        {% block head %} {% endblock %}

        <!-- Schrift -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
            rel="stylesheet"
        />
    </head>

    <body>
        <header>
            <a href="/">
                <h1>Abi 28</h1>
            </a>
            {% if user.is_authenticated %}
            <details class="profile-menu">
                <summary class="profile-btn">Profil</summary>
                <div class="profile-menu__content">
                    <a href="/projects/" class="profile-menu__link">Meine Aktionen</a>
                    <a href="/calendar/" class="profile-menu__link">Kalender</a>
                    <form method="post" action="{% url 'logout' %}" class="profile-menu__logout-form">
                        {% csrf_token %}
                        <button type="submit" class="profile-menu__logout">Logout</button>
                    </form>
                </div>
            </details>
            {% else %}
            <a href="{% url 'login' %}" class="profile-btn">Login</a>
            {% endif %}
        </header>

        {% block main %}{% endblock %}

        {% block scripts %}{% endblock %}
    </body>
</html>
